<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solace — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #fce4ec 0%, #ede7f6 35%, #e8f5e9 70%, #e3f2fd 100%); }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #f9d5d3, #dcd3f5); top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #c8eee4, #c9e8f5); bottom: -100px; right: -100px; }
  nav { z-index: 100; background: rgba(255,255,255,0.45); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.8); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: #4a3f5c; text-decoration: none; }
  .logo span { color: #b39ddb; font-style: italic; }
  .nav-right { display: flex; align-items: center; gap: 0.8rem; }
  .nav-btn { background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.9); border-radius: 50px; padding: 0.35rem 0.9rem; font-size: 0.8rem; color: #7a6b8a; cursor: pointer; text-decoration: none; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .nav-btn:hover { background: rgba(255,255,255,0.9); }
  .room-name { font-size: 0.88rem; color: #4a3f5c; font-weight: 500; }
  .chat-wrap { flex: 1; display: flex; flex-direction: column; max-width: 800px; width: 100%; margin: 0 auto; padding: 1rem 1rem 0; position: relative; z-index: 1; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 0.5rem 0; display: flex; flex-direction: column; gap: 0.7rem; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(179,157,219,0.3); border-radius: 4px; }
  .msg-row { display: flex; gap: 0.6rem; align-items: flex-end; }
  .msg-row.mine { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; color: white; flex-shrink: 0; background: linear-gradient(135deg, #ce93d8, #90caf9); }
  .bubble { max-width: 70%; background: rgba(255,255,255,0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.85); border-radius: 18px; border-bottom-left-radius: 4px; padding: 0.65rem 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .msg-row.mine .bubble { border-radius: 18px; border-bottom-right-radius: 4px; background: rgba(206,147,216,0.2); }
  .bubble-name { font-size: 0.7rem; color: #a899b8; margin-bottom: 0.25rem; font-weight: 500; }
  .bubble-text { font-size: 0.88rem; color: #4a3f5c; line-height: 1.5; }
  .bubble-time { font-size: 0.68rem; color: #a899b8; margin-top: 0.25rem; text-align: right; }
  .system-msg { text-align: center; font-size: 0.75rem; color: #a899b8; padding: 0.3rem 0; }
  .input-bar { background: rgba(255,255,255,0.5); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.85); padding: 1rem; display: flex; gap: 0.7rem; align-items: center; margin-top: 0.5rem; }
  .input-bar input { flex: 1; background: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.9); border-radius: 50px; padding: 0.7rem 1.2rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: #4a3f5c; outline: none; transition: border 0.2s; }
  .input-bar input:focus { border-color: #b39ddb; }
  .input-bar input::placeholder { color: #a899b8; }
  .send-btn { background: linear-gradient(135deg, #ce93d8, #90caf9); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(206,147,216,0.4); }
  .video-bar { background: rgba(255,255,255,0.45); border-bottom: 1px solid rgba(255,255,255,0.8); padding: 0.6rem 1.5rem; display: none; align-items: center; justify-content: space-between; z-index: 10; }
  .video-bar.show { display: flex; }
  .video-bar p { font-size: 0.82rem; color: #7a6b8a; }
  .video-join-btn { background: linear-gradient(135deg, #ce93d8, #90caf9); color: white; border: none; padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  #video_frame { width: 100%; height: 400px; border: none; border-radius: 16px; display: none; margin-bottom: 1rem; }
  #video_frame.show { display: block; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<nav>
  <a href="dashboard.html" class="logo">Sol<span>ace</span></a>
  <span class="room-name" id="room_name">Loading...</span>
  <div class="nav-right">
    <a href="groups.html" class="nav-btn">← Groups</a>
    <button class="nav-btn" id="video_toggle_btn" onclick="toggleVideo()" style="display:none">📹 Video</button>
  </div>
</nav>
<div class="video-bar" id="video_bar">
  <p>📹 This group has a video circle available</p>
  <button class="video-join-btn" onclick="toggleVideo()">Join Video Call</button>
</div>
<iframe id="video_frame" allow="camera; microphone; fullscreen; display-capture"></iframe>
<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="system-msg">🌸 Welcome to this safe space. Be kind, be gentle.</div>
  </div>
  <div class="input-bar">
    <input type="text" id="msg_input" placeholder="Share something... you're safe here" />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
  const token = localStorage.getItem('token');
  const alias = localStorage.getItem('alias') || 'You';
  if (!token) window.location.href = 'login.html';
  const params = new URLSearchParams(window.location.search);
  const groupId = params.get('group') || 1;
  const groupNames = { 1: 'Morning Anxiety Circle', 2: 'Grief & Loss Support', 3: 'Mindful Mondays', 4: 'Late Night Thoughts', 5: 'Resilience Workshop', 6: 'Creative Healing Circle' };
  const videoGroups = [3, 6];
  const groupName = groupNames[groupId] || 'Group Chat';
  document.getElementById('room_name').textContent = groupName;
  document.title = `Solace — ${groupName}`;
  if (videoGroups.includes(parseInt(groupId))) {
    document.getElementById('video_bar').classList.add('show');
    document.getElementById('video_toggle_btn').style.display = 'inline-block';
  }
  let videoVisible = false;
  function toggleVideo() {
    videoVisible = !videoVisible;
    const frame = document.getElementById('video_frame');
    if (videoVisible) {
      frame.src = `https://meet.jit.si/solace-room-${groupId}`;
      frame.classList.add('show');
      document.getElementById('video_bar').classList.remove('show');
    } else {
      frame.classList.remove('show');
      frame.src = '';
    }
  }
  const socket = io({ auth: { token } });
  socket.emit('join-room', groupId);
  socket.on('message', data => addMessage(data.alias, data.content, data.sent_at, false));
  fetch(`/api/groups/${groupId}/messages`, { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.json()).then(msgs => { msgs.forEach(m => addMessage(m.display_name, m.content, m.sent_at, m.display_name === alias)); })
    .catch(() => {});
  function addMessage(name, text, time, isMe) {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row' + (isMe ? ' mine' : '');
    const initial = (name || '?')[0].toUpperCase();
    const t = time ? new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
    row.innerHTML = `<div class="avatar">${initial}</div><div class="bubble"><div class="bubble-name">${name}</div><div class="bubble-text">${text}</div><div class="bubble-time">${t}</div></div>`;
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }
  function sendMessage() {
    const input = document.getElementById('msg_input');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('message', { groupId, content: text });
    addMessage(alias, text, new Date(), true);
    input.value = '';
  }
  document.getElementById('msg_input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
